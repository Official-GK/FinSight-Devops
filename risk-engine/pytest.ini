# ──────────────────────────────────────────────────────────────────────────────
# Risk Engine — pytest configuration
# ──────────────────────────────────────────────────────────────────────────────
[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

asyncio_mode = auto

addopts =
    --strict-markers
    --tb=short
    --cov=app
    --cov-report=term-missing
    --cov-report=xml:coverage.xml
    --cov-report=html:htmlcov
    --cov-fail-under=85
    -v

markers =
    unit: Pure unit tests — no I/O
    integration: Integration tests using FastAPI TestClient
    slow: Tests with heavy NumPy computation
    edge_case: Tests for boundary conditions and edge cases

filterwarnings =
    ignore::DeprecationWarning
    ignore::pytest.PytestUnraisableExceptionWarning
    ignore::RuntimeWarning

log_cli = true
log_cli_level = WARNING
log_format = %(asctime)s %(levelname)s %(name)s: %(message)s
