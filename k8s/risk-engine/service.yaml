# ──────────────────────────────────────────────────────────────────────────────
# Risk Engine — Kubernetes Service (ClusterIP)
# Internal-only — not exposed outside the cluster.
# Analytics API communicates with this via DNS: risk-engine-service:8001
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: risk-engine-service
  namespace: financial-risk
  labels:
    app: risk-engine
    app.kubernetes.io/name: risk-engine-service
    app.kubernetes.io/part-of: financial-risk-platform
  annotations:
    description: "Internal ClusterIP service for the Risk Engine microservice"
spec:
  type: ClusterIP        # Internal only — not reachable from outside the cluster
  selector:
    app: risk-engine
  ports:
    - name: http
      port: 8001
      targetPort: 8001
      protocol: TCP
    - name: metrics
      port: 9091
      targetPort: 9091
      protocol: TCP
  sessionAffinity: None
