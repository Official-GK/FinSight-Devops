# ──────────────────────────────────────────────────────────────────────────────
# Analytics API — pytest configuration
# ──────────────────────────────────────────────────────────────────────────────
[pytest]
# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Async mode — "auto" means all async test functions are treated as coroutines
# without needing the @pytest.mark.asyncio decorator on every function
asyncio_mode = auto

# Default CLI options applied to every run
addopts =
    --strict-markers
    --tb=short
    --cov=app
    --cov-report=term-missing
    --cov-report=xml:coverage.xml
    --cov-report=html:htmlcov
    --cov-fail-under=80
    -v

# Custom markers
markers =
    unit: Pure unit tests — no I/O, no network
    integration: Integration tests — may use TestClient or mock HTTP
    slow: Tests that are expected to be slow (matrix ops, etc.)
    resilience: Tests targeting retry and error-handling logic

# Warning filters
filterwarnings =
    ignore::DeprecationWarning
    ignore::pytest.PytestUnraisableExceptionWarning

# Log capture during tests
log_cli = true
log_cli_level = WARNING
log_format = %(asctime)s %(levelname)s %(name)s: %(message)s
log_date_format = %H:%M:%S
