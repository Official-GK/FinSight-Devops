apiVersion: apps/v1
kind: Deployment
metadata:
  name: risk-engine-deployment
  namespace: finsight
  labels:
    app: risk-engine
spec:
  replicas: 5
  selector:
    matchLabels:
      app: risk-engine
  template:
    metadata:
      labels:
        app: risk-engine
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "risk-engine"
        vault.hashicorp.com/agent-inject-secret-credentials.txt: "secret/data/risk-engine/credentials"
        vault.hashicorp.com/agent-inject-secret-database.txt: "secret/data/shared/database"
    spec:
      containers:
      - name: risk-engine
        image: finsight/risk-engine:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8001
        envFrom:
        - configMapRef:
            name: finsight-config
        - secretRef:
            name: finsight-secrets
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: risk-engine-service
  namespace: finsight
spec:
  selector:
    app: risk-engine
  ports:
    - protocol: TCP
      port: 8001
      targetPort: 8001
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: risk-engine-hpa
  namespace: finsight
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: risk-engine-deployment
  minReplicas: 5
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 75
